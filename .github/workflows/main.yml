name: Deploy to Arch Server via Tailscale

on:
  push:
    branches:
      - staging

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Tailscale and join tailnet
        run: |
          curl -fsSL https://tailscale.com/install.sh | sh
          sudo tailscale up --authkey ${{ secrets.TAILSCALE_AUTH_KEY }} --hostname github-runner-${{ github.run_id }}

      - name: Set up SSH key
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.DEPLOY_KEY }}

      - name: Deploy via SSH over Tailscale
        env:
          DEPLOY_HOST: ${{ vars.DEPLOY_HOST }}
          DEPLOY_USER: ${{ vars.DEPLOY_USER }}
          DEPLOY_COMMAND: ${{ vars.DEPLOY_COMMAND }}
        run: |
          test -n "$DEPLOY_HOST"
          test -n "$DEPLOY_USER"
          test -n "$DEPLOY_COMMAND"
          ssh -o StrictHostKeyChecking=no $DEPLOY_USER@$DEPLOY_HOST "$DEPLOY_COMMAND"

      - name: Logout from Tailscale
        if: always()
        run: |
          sudo tailscale logout
